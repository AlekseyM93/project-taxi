services:
  db:
    image: postgis/postgis:16-3.4
    container_name: taxi_db
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
      POSTGRES_DB: taxi
    ports:
      - "5433:5432"
    volumes:
      - taxi_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taxi_redis
    ports:
      - "6379:6379"

volumes:
  taxi_db_data:
