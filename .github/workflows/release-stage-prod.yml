name: Release Stage And Prod

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
      release_version:
        description: "Release version/tag"
        required: true
        type: string

jobs:
  validate-and-build:
    name: Validate And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    needs: validate-and-build
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run migration gate
        working-directory: backend
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_SSL: ${{ secrets.DB_SSL }}
          DB_SSL_REJECT_UNAUTHORIZED: ${{ secrets.DB_SSL_REJECT_UNAUTHORIZED }}
          DB_MIGRATIONS_RUN: "false"
        run: npm run migration:run

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migration-gate
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy command
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          TARGET_ENV: ${{ inputs.target_environment }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured"
            exit 1
          fi
          echo "Deploying version $RELEASE_VERSION to $TARGET_ENV"
          curl --fail --retry 4 --retry-delay 3 --max-time 30 \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
            -d "{\"releaseVersion\":\"$RELEASE_VERSION\",\"targetEnvironment\":\"$TARGET_ENV\"}"

      - name: Verify health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret is not configured"
            exit 1
          fi
          curl --fail --retry 6 --retry-delay 5 "$HEALTHCHECK_URL/ops/health/ready"

  rollback:
    name: Rollback On Failure
    if: failure()
    runs-on: ubuntu-latest
    needs: [migration-gate, deploy]
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Execute rollback command
        env:
          ROLLBACK_WEBHOOK_URL: ${{ secrets.ROLLBACK_WEBHOOK_URL }}
          ROLLBACK_WEBHOOK_TOKEN: ${{ secrets.ROLLBACK_WEBHOOK_TOKEN }}
          TARGET_ENV: ${{ inputs.target_environment }}
        run: |
          if [ -z "$ROLLBACK_WEBHOOK_URL" ]; then
            echo "ROLLBACK_WEBHOOK_URL secret is not configured"
            exit 1
          fi
          echo "Running rollback in $TARGET_ENV"
          curl --fail --retry 4 --retry-delay 3 --max-time 30 \
            -X POST "$ROLLBACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ROLLBACK_WEBHOOK_TOKEN" \
            -d "{\"targetEnvironment\":\"$TARGET_ENV\"}"
